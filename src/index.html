<!-- ************************ IMPORTANT INFORMATION ************************************
  This web navigation drawer template is provided as an example of how to configure
  a JET web application with a navigation drawer as a single page application
  using ojRouter and oj-module.  It contains the Oracle JET framework and a default
  requireJS configuration file to show how JET can be setup in a common application.
  This project template can be used in conjunction with demo code from the JET
  website to test JET component behavior and interactions.

  Any CSS styling with the prefix "demo-" is for demonstration only and is not
  provided as part of the JET framework.

  Please see the demos under Cookbook/Patterns/App Shell: Web and the CSS documentation
  under Support/API Docs/Non-Component Styling on the JET website for more information on how to use
  the best practice patterns shown in this template.

  Aria Landmark role attributes are added to the different sections of the application
  for accessibility compliance. If you change the type of content for a specific
  section from what is defined, you should also change the role value for that
  section to represent the appropriate content type.
  ***************************** IMPORTANT INFORMATION ************************************ -->
<html lang="en-us">
  <head>
    <title>Multi-Dataset Analytics</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1">
    <link rel="icon" href="css/images/JET-Favicon-Red-32x32.png" type="image/x-icon" />

    <!-- This is the main css file for the default theme -->
		<!-- injector:theme -->
		<!-- endinjector -->

    <!-- This contains icon fonts used by the starter template -->
		<!-- injector:font -->
		<!-- endinjector:font -->

    <!-- This is where you would add any app specific styling -->
    <link rel="stylesheet" href="css/app.css" type="text/css"/>

  </head>
  <body class="oj-web-applayout-body">
    <!-- Template for rendering navigation items shared between nav bar and nav list -->
    <script type="text/html" id="navTemplate">
      <li><a href="#">
        <span :class="[[$data.detail.iconClass]]"></span>
        <oj-bind-text value="[[$data.detail.label]]"></oj-bind-text>
      </a></li>
    </script>
    <script type="text/html" id="datasetAnalysisTemplate">
      <div class="analytics-page">
        <div class="page-heading">
          <div>
            <p class="eyebrow">Dataset analysis</p>
            <h2><oj-bind-text value="[[dataset().label]]"></oj-bind-text></h2>
            <p class="page-subtitle"><oj-bind-text value="[[dataset().fileName || 'Upload a dataset to begin analysis']]"></oj-bind-text></p>
          </div>
          <oj-button chroming="outlined" on-oj-action="[[goUpload]]">
            <span slot="startIcon" class="oj-ux-ico-upload"></span>
            Upload
          </oj-button>
        </div>

        <oj-bind-if test="[[!hasData()]]">
          <section class="empty-state">
            <h3>Dataset not loaded</h3>
            <p>This analysis page becomes available after all three datasets are uploaded.</p>
            <oj-button chroming="callToAction" on-oj-action="[[goUpload]]">Go to upload</oj-button>
          </section>
        </oj-bind-if>

        <oj-bind-if test="[[hasData()]]">
          <div>
            <div class="metric-grid compact">
              <section class="analytics-card stat-card">
                <span>Rows</span><strong><oj-bind-text value="[[dataset().summary.rowCount]]"></oj-bind-text></strong>
              </section>
              <section class="analytics-card stat-card">
                <span>Columns</span><strong><oj-bind-text value="[[dataset().summary.columnCount]]"></oj-bind-text></strong>
              </section>
              <section class="analytics-card stat-card">
                <span>Numeric columns</span><strong><oj-bind-text value="[[dataset().summary.numericColumns.length]]"></oj-bind-text></strong>
              </section>
            </div>

            <section class="analytics-card">
              <h3>Numeric summary</h3>
              <div class="stats-grid">
                <oj-bind-for-each data="[[dataset().summary.stats]]">
                  <template>
                    <div class="stat-strip">
                      <strong><oj-bind-text value="[[$current.data.column]]"></oj-bind-text></strong>
                      <span>Avg <oj-bind-text value="[[$current.data.average]]"></oj-bind-text></span>
                      <span>Min <oj-bind-text value="[[$current.data.min]]"></oj-bind-text></span>
                      <span>Max <oj-bind-text value="[[$current.data.max]]"></oj-bind-text></span>
                    </div>
                  </template>
                </oj-bind-for-each>
              </div>
            </section>

            <div class="chart-grid">
              <section class="analytics-card chart-panel">
                <h3>Bar chart</h3>
                <oj-chart type="bar" data="[[barProvider]]" animation-on-display="auto">
                  <template slot="itemTemplate" data-oj-as="item">
                    <oj-chart-item value="[[item.data.value]]" group-id="[[[item.data.group]]]" series-id="[[item.data.series]]"></oj-chart-item>
                  </template>
                </oj-chart>
                <p class="observation">Top categories reveal the strongest distribution drivers.</p>
              </section>
              <section class="analytics-card chart-panel">
                <h3>Pie chart</h3>
                <oj-chart type="pie" data="[[pieProvider]]" animation-on-display="auto">
                  <template slot="itemTemplate" data-oj-as="item">
                    <oj-chart-item value="[[item.data.value]]" group-id="[[['Distribution']]]" series-id="[[item.data.group]]"></oj-chart-item>
                  </template>
                </oj-chart>
                <p class="observation">The largest slice identifies the dominant category.</p>
              </section>
              <section class="analytics-card chart-panel">
                <h3>Line chart</h3>
                <oj-chart type="line" data="[[lineProvider]]" animation-on-display="auto">
                  <template slot="itemTemplate" data-oj-as="item">
                    <oj-chart-item value="[[item.data.value]]" group-id="[[[item.data.group]]]" series-id="[[item.data.series]]"></oj-chart-item>
                  </template>
                </oj-chart>
                <p class="observation">The first numeric measure shows row-order movement.</p>
              </section>
              <section class="analytics-card chart-panel">
                <h3>Area chart</h3>
                <oj-chart type="area" data="[[areaProvider]]" animation-on-display="auto">
                  <template slot="itemTemplate" data-oj-as="item">
                    <oj-chart-item value="[[item.data.value]]" group-id="[[[item.data.group]]]" series-id="[[item.data.series]]"></oj-chart-item>
                  </template>
                </oj-chart>
                <p class="observation">Area shading emphasizes magnitude across records.</p>
              </section>
              <section class="analytics-card chart-panel wide">
                <h3>Scatter plot</h3>
                <oj-chart type="scatter" data="[[scatterProvider]]" animation-on-display="auto">
                  <template slot="itemTemplate" data-oj-as="item">
                    <oj-chart-item x="[[item.data.x]]" y="[[item.data.y]]" value="[[item.data.value]]" group-id="[[[item.data.group]]]" series-id="[[item.data.series]]"></oj-chart-item>
                  </template>
                </oj-chart>
                <p class="observation">Scatter points compare the first two numeric columns where available.</p>
              </section>
            </div>

            <section class="analytics-card table-panel">
              <div class="table-toolbar">
                <h3>Data table</h3>
                <oj-input-text label-hint="Filter rows" value="{{filterText}}" clear-icon="always"></oj-input-text>
              </div>
              <oj-table aria-label="Dataset table"
                        data="[[tableDataProvider]]"
                        columns="[[tableColumns]]"
                        display="grid"
                        class="analytics-table">
              </oj-table>
            </section>
          </div>
        </oj-bind-if>
      </div>
    </script>

    <div id="globalBody">

      <div id="announce" tabindex="-1" class="send-off-screen" :aria-live="[[manner]]" aria-atomic="true">
          <p id="ariaLiveMessage"><oj-bind-text value="[[message]]"></oj-bind-text></p>
      </div>

      <!--
         ** Oracle JET V20.1.0 web application navigation drawer pattern.
         ** Please see the demos under Cookbook/Patterns/App Shell: Web
         ** and the CSS documentation under Support/API Docs/Non-Component Styling
         ** on the JET website for more information on how to use this pattern.
         ** The off-canvas section is used when the browser is resized to a smaller media
         ** query size for a phone format and hidden until a user clicks on
         ** the header hamburger icon.
      -->
      <oj-drawer-popup id="navDrawer" edge="start" opened="{{sideDrawerOn}}"
                       modality="modeless" role="navigation"
                       class="oj-bg-neutral-170 oj-color-invert">
        <oj-navigation-list id="navDrawerList" data="[[navDataProvider]]"
                            item.renderer="[[KnockoutTemplateUtils.getRenderer('navTemplate', true)]]"
                            on-click="[[toggleDrawer]]"
                            selection="{{selection.path}}">
        </oj-navigation-list>
      </oj-drawer-popup>
      <div id="pageContent" class="oj-web-applayout-page">
        <!--
           ** Oracle JET V20.1.0 web application header pattern.
           ** Please see the demos under Cookbook/Patterns/App Shell: Web
           ** and the CSS documentation under Support/API Docs/Non-Component Styling
           ** on the JET website for more information on how to use this pattern.
        -->
        <header role="banner" class="oj-web-applayout-header">
          <div class="oj-web-applayout-max-width oj-flex-bar oj-sm-align-items-center">
            <!-- Drawer toggle button -->
            <div class="oj-flex-bar-start oj-md-hide">
              <oj-button id="drawerToggleButton" class="oj-button-lg" on-oj-action="[[toggleDrawer]]" chroming="borderless" display="icons">
                <span slot="startIcon" class="oj-web-applayout-offcanvas-icon"></span>
                <span>Application Navigation</span>
              </oj-button>
            </div>
            <div class="oj-flex-bar-middle oj-sm-align-items-baseline">
              <img class="oj-icon demo-oracle-icon" title="Oracle Logo" alt="Oracle Logo"></img>
              <h1 class="oj-sm-only-hide oj-web-applayout-header-title" title="Application Name"><oj-bind-text value="[[appName]]"></oj-bind-text></h1>
            </div>
            <div class="oj-flex-bar-end">
              <!-- Responsive Toolbar -->
              <oj-toolbar>
                <oj-menu-button id="userMenu" display="[[smScreen() ? 'icons' : 'all']]" chroming="borderless">
                  <span><oj-bind-text value="[[userLogin]]"></oj-bind-text></span>
                  <span slot="endIcon" :class="[[{'oj-icon demo-appheader-avatar': smScreen(), 'oj-component-icon oj-button-menu-dropdown-icon': !smScreen()}]]"></span>
                  <oj-menu id="menu1" slot="menu">
                    <oj-option id="pref" value="pref">Preferences</oj-option>
                    <oj-option id="help" value="help">Help</oj-option>
                    <oj-option id="about" value="about">About</oj-option>
                    <oj-option id="out" value="out">Sign Out</oj-option>
                  </oj-menu>
                </oj-menu-button>
              </oj-toolbar>
            </div>
          </div>
          <div role="navigation" class="oj-web-applayout-max-width oj-web-applayout-navbar">
            <oj-tab-bar id="navTabBar" class="oj-sm-only-hide oj-md-condense oj-md-justify-content-flex-end"
                                data="[[navDataProvider]]"
                                edge="top"
                                item.renderer="[[KnockoutTemplateUtils.getRenderer('navTemplate', true)]]"
                                selection="{{selection.path}}">
            </oj-tab-bar>
          </div>
        </header>
        <oj-module role="main" class="oj-web-applayout-max-width oj-web-applayout-content" config="[[moduleAdapter.koObservableConfig]]">
        </oj-module>
        <footer class="oj-web-applayout-footer" role="contentinfo">
          <div class="oj-web-applayout-footer-item oj-web-applayout-max-width">
            <ul>
              <oj-bind-for-each data="[[footerLinks]]">
                <template>
                  <li>
                    <a :id="[[$current.data.linkId]]" :href="[[$current.data.linkTarget]]">
                      <oj-bind-text value="[[$current.data.name]]"></oj-bind-text>
                    </a>
                  </li>
                </template>
              </oj-bind-for-each>
            </ul>
          </div>
          <div class="oj-web-applayout-footer-item oj-web-applayout-max-width oj-text-color-secondary oj-typography-body-sm">
            Copyright © 2014, 2026 Oracle and/or its affiliates All rights reserved.
          </div>
        </footer>
      </div>
    </div>

    <!-- This injects script tags for the main javascript files -->
		<!-- injector:scripts -->
		<!-- endinjector -->

  </body>

</html>
